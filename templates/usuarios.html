<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCE - Usuarios</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="dashboard-layout">
    {% include '_menu.html' %}  
        <main class="content-area">
            <div class="page-header">
                <div class="page-header-top">
                    <h2>👥 Usuarios</h2>
                </div>
                <div class="page-header-stats" id="header-stats">
                    <span>Total: <b id="stat-total">0</b></span>
                    <span style="color:#22c55e;">🟢 <b id="stat-tto">0</b> en TTO</span>
                    <span style="color:#3b82f6;">🔵 <b id="stat-alta">0</b> alta</span>
                    <span style="color:#facc15;">🟡 <b id="stat-pausa">0</b> pausa</span>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="filtros-wrapper">  
                <span style="color:#94a3b8; font-size:0.9rem;">🔍</span>
                <input type="text" id="filtro-buscar" class="input-buscar"
                    placeholder="Buscar por nombre o RUT..."
                    oninput="filtrarUsuarios()">
                <select class="filtro-select-mini" id="filtro-estado" onchange="filtrarUsuarios()">
                    <option value="">Estado</option>
                    <option value="en_tto">🟢 En TTO</option>
                    <option value="alta">🔵 Alta</option>
                    <option value="pausa">🟡 Pausa</option>
                    <option value="lista_espera">🟠 Lista espera</option>
                    <option value="derivado">⚪ Derivado</option>
                </select>
                <select class="filtro-select-mini" id="filtro-edad" onchange="filtrarUsuarios()">
                    <option value="">Edad</option>
                    <option value="asc">Mayor a menor</option>
                    <option value="desc">Menor a mayor</option>
                </select>
                <select class="filtro-select-mini" id="filtro-ciclos" onchange="filtrarUsuarios()">
                    <option value="">Ciclos</option>
                    <option value="desc">Mayor a menor</option>
                    <option value="asc">Menor a mayor</option>
                </select>
            </div>

            <!-- TOGGLE VISTA -->
            <div class="vista-toggle">
                <button class="btn-vista activo" id="btn-vista-tabla" onclick="cambiarVista('tabla')">☰ Tabla</button>
                <button class="btn-vista" id="btn-vista-cards" onclick="cambiarVista('cards')">⊞ Cards</button>
                <button class="btn-vista" id="btn-vista-compacta" onclick="cambiarVista('compacta')">≡ Compacta</button>
                <span class="total-usuarios" id="total-label">0 usuarios</span>
            </div>

            <!-- VISTAS -->
            <div id="vista-tabla" class="tabla-container"></div>
            <div id="vista-cards" class="cards-grid" style="display:none;"></div>
            <div id="vista-compacta" class="compacta-lista" style="display:none;"></div>

        </main>

        <!-- BOTÓN FLOTANTE -->
        <button class="btn-flotante" onclick="abrirModalUsuario()">➕ Nuevo Usuario</button>
        </div>

        <!-- MODAL NUEVO USUARIO (trasladado desde dashboard) -->
        {% include 'partials/_modal_usuario.html' %}
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/usuarios.js"></script>
</body>
</html>
