        <div id="modal-usuario" class="modal-overlay">
            <div class="modal-content" style="max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto;">
                <div class="modal-header">
                    <h2>👤 Registrar Nuevo Usuario</h2>
                    <button class="btn-close" onclick="cerrarModalUsuario()">&times;</button>
                </div>
                <form id="form-usuario">
                    <div class="form-seccion">
                        <h4 class="form-seccion-titulo">📋 Datos Básicos</h4>
                        <div class="form-grid-2">
                            <div class="form-group" style="grid-column: 1/-1;">
                                <label>Foto del Usuario</label>
                                <div class="foto-upload-container" onclick="document.getElementById('input-foto').click()">
                                    <img id="preview-foto" src="https://ui-avatars.com/api/?name=Nuevo+Usuario&background=e2e8f0&color=94a3b8&size=128" 
                                        class="preview-foto-img">
                                    <div class="foto-upload-overlay">
                                        <span>📷 Cambiar foto</span>
                                    </div>
                                </div>
                                <input type="file" id="input-foto" accept="image/*" capture="environment" 
                                    style="display:none;" onchange="previsualizarFoto(event)">
                                <p style="font-size:0.75rem; color:#94a3b8; margin-top:6px; text-align:center;">
                                    Haz clic para subir o tomar foto
                                </p>
                            </div>
                            <div class="form-group">
                                <label>RUT *</label>
                                <input type="text" id="usuario-rut" placeholder="Ej: 12345678-9">
                            </div>
                            <div class="form-group">
                                <label>Nombre Completo *</label>
                                <input type="text" id="usuario-nombre" placeholder="Ej: Juan Pérez">
                            </div>
                            <div class="form-group">
                                <label>Fecha de Nacimiento *</label>
                                <input type="date" id="usuario-fecha-nacimiento">
                            </div>
                            <div class="form-group">
                                <label>Teléfono 1</label>
                                <input type="text" id="usuario-telefono1" placeholder="Ej: +56912345678">
                            </div>
                            <div class="form-group">
                                <label>Nombre Tutor</label>
                                <input type="text" id="usuario-tutor" placeholder="Ej: María González">
                            </div>
                            <div class="form-group">
                                <label>Establecimiento Educacional</label>
                                <input type="text" id="usuario-establecimiento" placeholder="Ej: Escuela Villa Alegre">
                            </div>
                        </div>
                    </div>

                    <div class="form-seccion">
                        <h4 class="form-seccion-titulo collapsible" onclick="toggleSeccion('seccion-adicional', this)">
                            ➕ Datos Adicionales <span class="seccion-badge">Opcional</span>
                        </h4>
                        <div id="seccion-adicional" style="display:none;">
                            <div class="form-grid-2">
                                <div class="form-group">
                                    <label>Teléfono 2</label>
                                    <input type="text" id="usuario-telefono2">
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="usuario-email">
                                </div>
                                <div class="form-group">
                                    <label>Tarifa Pactada</label>
                                    <input type="number" id="usuario-tarifa">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-seccion">
                        <h4 class="form-seccion-titulo collapsible" onclick="toggleSeccion('seccion-diagnosticos-nuevo', this)">
                            📋 Diagnósticos <span class="seccion-badge">Opcional</span>
                        </h4>
                        <div id="seccion-diagnosticos-nuevo" style="display:none;">
                            <div id="lista-diagnosticos-nuevo"></div>
                            <div class="form-grid-2">
                                <div class="form-group">
                                    <label>Descripción *</label>
                                    <input type="text" id="nuevo-diag-descripcion">
                                </div>
                                <div class="form-group">
                                    <label>Tipo *</label>
                                    <input type="text" id="nuevo-diag-tipo">
                                </div>
                                <div class="form-group">
                                    <label>Fecha</label>
                                    <input type="date" id="nuevo-diag-fecha">
                                </div>
                            </div>
                            <button type="button" class="btn-secondary" onclick="agregarDiagnosticoNuevo()">➕ Agregar Diagnóstico</button>
                        </div>
                    </div>

                    <div class="form-seccion">
                        <h4 class="form-seccion-titulo collapsible" onclick="toggleSeccion('seccion-medicamentos-nuevo', this)">
                            💊 Medicamentos <span class="seccion-badge">Opcional</span>
                        </h4>
                        <div id="seccion-medicamentos-nuevo" style="display:none;">
                            <div id="lista-medicamentos-nuevo"></div>
                            <div class="form-grid-2">
                                <div class="form-group">
                                    <label>Nombre *</label>
                                    <input type="text" id="nuevo-med-nombre">
                                </div>
                                <div class="form-group">
                                    <label>Dosis</label>
                                    <input type="text" id="nuevo-med-dosis">
                                </div>
                                <div class="form-group">
                                    <label>Fecha Inicio</label>
                                    <input type="date" id="nuevo-med-inicio">
                                </div>
                                <div class="form-group">
                                    <label>Fecha Fin</label>
                                    <input type="date" id="nuevo-med-fin">
                                </div>
                            </div>
                            <button type="button" class="btn-secondary" onclick="agregarMedicamentoNuevo()">➕ Agregar Medicamento</button>
                        </div>
                    </div>

                    <p id="usuario-mensaje-error" class="mensaje-error"></p>
                    <button type="button" class="btn-primary" style="margin-top:20px; width:100%;" onclick="guardarUsuario()">💾 Guardar Usuario</button>
                </form>
            </div>
        </div>
