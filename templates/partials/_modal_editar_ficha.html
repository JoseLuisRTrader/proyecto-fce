<div id="modal-editar-ficha" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h2>✏️ Editar Usuario</h2>
                <button class="btn-close" onclick="cerrarEditarUsuario()">&times;</button>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="cambiarTab('datos')">👤 Datos Personales</button>
                <button class="tab-btn" onclick="cambiarTab('diagnosticos')">📋 Diagnósticos</button>
                <button class="tab-btn" onclick="cambiarTab('medicamentos')">💊 Medicamentos</button>
            </div>

            <div id="tab-datos" class="tab-content active">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="edit-nombre">
                </div>
                <div class="form-group">
                    <label>RUT</label>
                    <input type="text" id="edit-rut">
                </div>
                <div class="form-group">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" id="edit-fecha-nacimiento">
                </div>
                <div class="form-group">
                    <label>Teléfono 1</label>
                    <input type="text" id="edit-telefono1">
                </div>
                <div class="form-group">
                    <label>Teléfono 2</label>
                    <input type="text" id="edit-telefono2">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="edit-email">
                </div>
                <div class="form-group">
                    <label>Nombre Tutor</label>
                    <input type="text" id="edit-tutor">
                </div>
                <div class="form-group">
                    <label>Establecimiento Educacional</label>
                    <input type="text" id="edit-establecimiento">
                </div>
                <div class="form-group">
                    <label>Tarifa Pactada</label>
                    <input type="number" id="edit-tarifa" placeholder="Ej: 35000">
                </div>
                <button class="btn-primary" style="margin-top:20px;" onclick="guardarDatosUsuario(() => cargarFicha())">💾 Guardar Cambios</button>
            </div>

            <div id="tab-diagnosticos" class="tab-content">
                <div id="lista-diagnosticos"></div>
                <hr style="margin: 15px 0;">
                <input type="hidden" id="diag-edit-id" value="">
                <h4 id="diag-form-titulo">Agregar Diagnóstico</h4>
                <div class="form-group">
                    <label>Descripción *</label>
                    <input type="text" id="diag-descripcion">
                </div>
                <div class="form-group">
                    <label>Tipo *</label>
                    <input type="text" id="diag-tipo">
                </div>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="diag-fecha">
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-primary" id="diag-btn-guardar" onclick="guardarDiagnostico()">➕ Agregar</button>
                    <button class="btn-secondary" id="diag-btn-cancelar" onclick="cancelarEditarDiagnostico()" style="display:none;">❌ Cancelar</button>
                </div>
            </div>

            <div id="tab-medicamentos" class="tab-content">
                <div id="lista-medicamentos"></div>
                <hr style="margin: 15px 0;">
                <input type="hidden" id="med-edit-id" value="">
                <h4 id="med-form-titulo">Agregar Medicamento</h4>
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" id="med-nombre">
                </div>
                <div class="form-group">
                    <label>Dosis</label>
                    <input type="text" id="med-dosis">
                </div>
                <div class="form-group">
                    <label>Fecha Inicio</label>
                    <input type="date" id="med-fecha-inicio">
                </div>
                <div class="form-group">
                    <label>Fecha Fin</label>
                    <input type="date" id="med-fecha-fin">
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-primary" id="med-btn-guardar" onclick="guardarMedicamento()">➕ Agregar</button>
                    <button class="btn-secondary" id="med-btn-cancelar" onclick="cancelarEditarMedicamento()" style="display:none;">❌ Cancelar</button>
                </div>
            </div>
        </div>
    </div>
