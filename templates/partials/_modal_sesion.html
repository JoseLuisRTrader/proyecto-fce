<div id="modal-sesion" class="modal-overlay">
        <div class="modal-content" style="max-width: 650px; width: 95%; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h2 id="sesion-modal-titulo">📝 Sesión</h2>
                <button class="btn-close" onclick="cerrarModalSesion()">&times;</button>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="cambiarTabSesion('registro')">📋 Registro</button>
                <button class="tab-btn" onclick="cambiarTabSesion('indicadores')">✅ Indicadores</button>
            </div>

            <div id="stab-registro" class="tab-content active">
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="sesion-fecha">
                </div>
                <div class="form-group">
                    <label>Evolución / Actividades</label>
                    <textarea id="sesion-actividades" rows="5" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; resize:vertical; font-size:0.95rem;"></textarea>
                </div>
                <div class="form-group">
                    <label>Materiales</label>
                    <textarea id="sesion-materiales" rows="3" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; resize:vertical; font-size:0.95rem;"></textarea>
                </div>
                <div class="form-group">
                    <label>Compromisos</label>
                    <textarea id="sesion-compromisos" rows="3" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; resize:vertical; font-size:0.95rem;"></textarea>
                </div>
                <button class="btn-primary" style="margin-top:16px;" onclick="guardarSesion()">💾 Guardar Registro</button>
            </div>

            <div id="stab-indicadores" class="tab-content">
                <div id="sesion-indicadores-lista"></div>
                <button class="btn-primary" style="margin-top:16px;" onclick="guardarEvaluaciones()">💾 Guardar Evaluaciones</button>
            </div>
        </div>
    </div>
