<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCE - Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="dashboard-layout">

    {% include '_menu.html' %}

        <main class="content-area">

            <!-- Alerta de registros pendientes -->
            <div id="alerta-pendientes"></div>

            <!-- Tarjetas de resumen -->
            <section class="dashboard-grid">
                <div class="card">
                    <h3>Citas de Hoy</h3>
                    <p id="citas-hoy">0</p>
                </div>
                <div class="card">
                    <h3>Ciclos Activos</h3>
                    <p id="ciclos-activos">0</p>
                </div>
                <div class="card">
                    <h3>Total Usuarios</h3>
                    <p id="total-usuarios">0</p>
                </div>
            </section>

            <!-- Próximos días -->
            <section class="table-section" style="margin-top: 40px;">
                <h2 style="margin-bottom: 20px; color: #374151;">Próximos Días</h2>
                <div id="lista-proximos-dias"></div>
            </section>

        </main>
    </div><!-- cierre main-wrapper del _menu.html -->
    
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/main.js?v=4.0"></script>
</body>
</html>
